name: Twice Weekly Inventory Check

on:
  schedule:
    # Run Monday and Thursday at 8:00 AM EST (1:00 PM UTC)
    - cron: '0 13 * * 1,4'  # Monday=1, Thursday=4
  workflow_dispatch: # Allow manual trigger

jobs:
  check-inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run inventory check
        env:
          UNWRANGLE_API_KEY: ${{ secrets.UNWRANGLE_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: "smtp.gmail.com"
          SMTP_PORT: "587" 
        run: |
          python inventory_checker.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inventory-results-${{ github.run_number }}
          path: |
            results_*.json
            oos_tracking.json
          retention-days: 30

      - name: Commit and push tracking data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add oos_tracking.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update OOS tracking data [skip ci]"
          git push
        continue-on-error: true
